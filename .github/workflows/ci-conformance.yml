name: CI Conformance

on: 
    push:
        branches: [main]
    pull_request_target:

env:
  CQFD_VERSION: 5.10.2

jobs:
    shellcheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
            - name: Install CQFD and create docker image
              run: |
                  curl -LO https://github.com/savoirfairelinux/cqfd/releases/download/v${{ env.CQFD_VERSION }}/cqfd_${{ env.CQFD_VERSION }}_all.deb
                  sudo dpkg -i ./cqfd_${{ env.CQFD_VERSION }}_all.deb
                  id -u
                  id -g
                  cqfd --verbose init
            - name: Run shellcheck
              run: |
                  cqfd -b shellcheck
    pylint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
            - name: Install CQFD and create docker image
              run: |
                  curl -LO https://github.com/savoirfairelinux/cqfd/releases/download/v${{ env.CQFD_VERSION }}/cqfd_${{ env.CQFD_VERSION }}_all.deb
                  sudo dpkg -i ./cqfd_${{ env.CQFD_VERSION }}_all.deb
                  cqfd init
            - name: Run pylint
              run: |
                  cqfd -b pylint
    black:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
            - name: Install CQFD and create docker image
              run: |
                  curl -LO https://github.com/savoirfairelinux/cqfd/releases/download/v${{ env.CQFD_VERSION }}/cqfd_${{ env.CQFD_VERSION }}_all.deb
                  sudo dpkg -i ./cqfd_${{ env.CQFD_VERSION }}_all.deb
                  cqfd init
            - name: Run black
              run: |
                  cqfd -b black
    clang-format:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
            - name: Install CQFD and create docker image
              run: |
                  curl -LO https://github.com/savoirfairelinux/cqfd/releases/download/v${{ env.CQFD_VERSION }}/cqfd_${{ env.CQFD_VERSION }}_all.deb
                  sudo dpkg -i ./cqfd_${{ env.CQFD_VERSION }}_all.deb
                  cqfd init
            - name: Run clang-format
              run: |
                  cqfd -b clang-format
    clang-tidy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
                  submodules: true
            - name: Install CQFD and create docker image
              run: |
                  curl -LO https://github.com/savoirfairelinux/cqfd/releases/download/v${{ env.CQFD_VERSION }}/cqfd_${{ env.CQFD_VERSION }}_all.deb
                  sudo dpkg -i ./cqfd_${{ env.CQFD_VERSION }}_all.deb
                  cqfd init
            - name: Run clang-tidy
              run: |
                  cqfd -b clang-tidy
    on-target-tests-ssh-imx93:
        uses: ./.github/workflows/ci-conformance-on-target-ssh.yml
        with:
            runner: imx93
        secrets:
            target_ip: ${{ secrets.IMX93_TARGET_IP }}
            target_password: ${{ secrets.IMX93_TARGET_PASSWORD }}
        needs: [shellcheck, pylint, black, clang-format, clang-tidy]
    on-target-tests-serial-imx93:
        uses: ./.github/workflows/ci-conformance-on-target-serial.yml
        with:
            runner: imx93
            target_tty: /dev/ttyGEISA_imx93
        secrets:
            target_password: ${{ secrets.IMX93_TARGET_PASSWORD }}
        needs: [shellcheck, pylint, black, clang-format, clang-tidy, on-target-tests-ssh-imx93]
